<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>口腔AI模拟诊疗</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Microsoft YaHei',sans-serif;background:#f0f4f8;min-height:100vh}
.header{background:linear-gradient(135deg,#1B3A5C,#2B7BEC);color:#fff;padding:11px 20px;display:flex;justify-content:space-between;align-items:center}
.header h1{font-size:19px}.header .meta{font-size:12px;opacity:.85}
.container{max-width:1100px;margin:0 auto;padding:14px}
/* 阶段指示器 */
.phases{display:flex;background:#fff;border-radius:12px;overflow:hidden;margin-bottom:14px}
.phases button{flex:1;padding:12px;border:none;font-size:13px;font-weight:600;cursor:pointer;background:#f5f5f5;color:#bbb;transition:.3s}
.phases button.active{background:linear-gradient(135deg,#2B7BEC,#1B3A5C);color:#fff}
.phases button.done{background:#d5f5e3;color:#27ae60}
.phases button .num{display:inline-block;width:20px;height:20px;line-height:20px;border-radius:50%;font-size:11px;margin-right:3px;background:rgba(0,0,0,.1)}
.phases button.active .num{background:rgba(255,255,255,.2)}
.intro-box{background:linear-gradient(135deg,#fef9e7,#fff8e1);border:1.5px solid #f9e79f;border-radius:10px;padding:14px;margin-bottom:14px}
.intro-box .cc{font-size:17px;font-weight:700;color:#e67e22}
.intro-box .cc:before{content:'🦷 主诉: '}
.panel{max-width:900px;margin:0 auto}
.img-desc{font-size:12px;color:#555;padding:8px;background:#f5f5f5;border-radius:6px;margin-top:6px}
/* 对话 */
.chat{max-height:320px;overflow-y:auto;margin:14px 0;padding-right:8px}
.msg{margin:6px 0;padding:10px 14px;border-radius:10px;font-size:13px;line-height:1.5;max-width:85%}
.msg.st{background:linear-gradient(135deg,#2B7BEC,#1B3A5C);color:#fff;margin-left:auto;text-align:right}
.msg.pt{background:#fff;border:1.5px solid #e0e0e0;margin-right:auto}
.msg.pt:before{content:'🏥 ';font-size:11px;display:block;opacity:.5;margin-bottom:3px}
.msg.st:after{content:' 🩺';font-size:11px;opacity:.5}
.chat-input{display:flex;gap:8px}
.chat-input input{flex:1;padding:10px 14px;border:2px solid #2B7BEC;border-radius:10px;font-size:14px}
.chat-input button{padding:10px 20px;background:linear-gradient(135deg,#2B7BEC,#1B3A5C);color:#fff;border:none;border-radius:10px;font-weight:600;cursor:pointer}
.coverage{height:4px;background:#eee;border-radius:2px;margin:8px 0;overflow:hidden}
.coverage .bar{height:100%;background:#27ae60;transition:width .5s}
/* 检查模块 */
.exam-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:8px 0}
.exam-card{background:#fff;border:1.5px solid #e0e0e0;border-radius:10px;padding:12px;cursor:pointer;transition:.2s}
.exam-card:hover{border-color:#2B7BEC}
.exam-card.selected{background:#e8f0fe;border-color:#2B7BEC;border-width:2px}
.exam-card.done{background:#e8f8f0;border-color:#27ae60}
.exam-card h4{font-size:14px;margin-bottom:6px}
.form-group{margin-bottom:10px}
.form-group label{display:block;font-size:13px;font-weight:600;color:#1B3A5C;margin-bottom:3px}
.form-group input,.form-group textarea{width:100%;padding:9px 12px;border:1.5px solid #dde;border-radius:8px;font-size:13px}
.form-group textarea{min-height:50px;resize:vertical}
.feedback{background:#e8f8f0;border-radius:8px;padding:10px;font-size:12px;margin-top:6px;display:none}
.feedback.show{display:block}
.feedback .correct{color:#27ae60;margin-top:6px}
/* 按钮 */
.btn{padding:10px 22px;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;transition:.3s}
.btn-p{background:linear-gradient(135deg,#2B7BEC,#1B3A5C);color:#fff}
.btn-s{background:#27ae60;color:#fff}
.btn-n{background:linear-gradient(135deg,#e67e22,#d35400);color:#fff;float:right}
.btn-o{background:#8e44ad;color:#fff}
.case-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px;padding:20px}
.case-card{background:#fff;border-radius:12px;padding:20px;cursor:pointer;transition:.3s;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.case-card:hover{transform:translateY(-3px);box-shadow:0 6px 20px rgba(0,0,0,.15)}
.case-card h3{font-size:16px;color:#1B3A5C}
/* 结果 */
.result-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.6);z-index:999;align-items:center;justify-content:center}
.result-overlay.show{display:flex}
.result-card{background:#fff;border-radius:16px;padding:24px;max-width:750px;width:95%;max-height:85vh;overflow-y:auto}
.record-box{background:#f9fafb;border-radius:8px;padding:12px;font-size:12px;line-height:1.8;white-space:pre-wrap;max-height:250px;overflow-y:auto}
.scores{display:flex;justify-content:center;gap:18px;margin:14px 0}
.scores .itm{text-align:center}.scores .val{font-size:30px;font-weight:700}.scores .lbl{font-size:11px;color:#999}
</style></head>
<body>
<div class="header"><h1>🩺 口腔AI模拟诊疗</h1><span class="meta" id="headerMeta"></span></div>
<div class="container">
<div id="caseSelect"><div style="text-align:center;padding:30px"><h2 style="margin-bottom:16px">选择病例（仅展示主诉症状）</h2><div class="case-grid" id="caseCards"></div></div></div>

<div id="consultUI" style="display:none">
<div class="phases">
<button class="active" id="tab1" onclick="goPhase(1)"><span class="num">1</span>病史采集</button>
<button id="tab2" onclick="goPhase(2)"><span class="num">2</span>口腔检查</button>
<button id="tab3" onclick="goPhase(3)"><span class="num">3</span>病历书写</button>
</div>
<div class="panel" id="phasePanel"></div>
</div>
</div>
<div class="result-overlay" id="resultOverlay"><div class="result-card" id="resultCard"></div></div>

<script>
let caseId=null,caseInfo=null,phase=1,examItems=[],examSeq=[],examIdx=0,examDone={},examTotalScore=0;

// 加载病例列表
fetch('/api/consult/cases').then(r=>r.json()).then(cases=>{
  let html='';
  for(let cid in cases){let c=cases[cid];html+=`<div class="case-card" onclick="startCase('${cid}')"><h3>🦷 ${c.title}</h3><p style="font-size:13px;color:#666;margin-top:6px">${c.patient.name}·${c.patient.gender}·${c.patient.age}岁</p><p style="font-size:11px;color:#999;margin-top:4px">${c.difficulty}</p></div>`}
  document.getElementById('caseCards').innerHTML=html;
});

async function startCase(cid){
  let r=await fetch('/api/consult/start/'+cid,{method:'POST'});caseInfo=await r.json();
  caseId=cid;phase=1;examSeq=[];examDone={};examIdx=0;examTotalScore=0;
  document.getElementById('caseSelect').style.display='none';
  document.getElementById('consultUI').style.display='block';
  document.getElementById('headerMeta').textContent=caseInfo.patient.name+' | '+caseInfo.patient.gender+' '+caseInfo.patient.age+'岁';
  renderPhase();
}

function goPhase(p){
  if(p>phase)return;
  renderPhase();
}

function updateTabs(){
  for(let i=1;i<=3;i++){
    let t=document.getElementById('tab'+i);t.className='';
    if(i===phase)t.classList.add('active');
    if(i<phase)t.classList.add('done');
  }
}

function renderPhase(){
  updateTabs();
  if(phase===1)renderP1();
  else if(phase===2)renderP2();
  else if(phase===3)renderP3();
}

// ═══════════════════ Phase 1: 自由对话 ═══════════════════
function renderP1(){
  let html=`<div class="intro-box"><div class="cc">${caseInfo.chief_complaint}</div>`;
  for(let img of caseInfo.images){
    html+=`<div class="img-desc"><strong>📷 ${img.label}:</strong> ${img.desc}`;
    if(img.url) html+=`<br><img src="${img.url}" style="max-width:100%;max-height:300px;margin-top:8px;border-radius:6px;border:1px solid #ddd" onerror="this.style.display='none'">`;
    html+=`</div>`;
  }
  html+=`</div><div class="chat" id="chatBox"></div><div class="coverage"><div class="bar" id="coverBar" style="width:0%"></div></div>
  <p style="font-size:11px;color:#999;text-align:right">问诊覆盖度: <span id="coverPct">0%</span></p>
  <div class="chat-input"><input id="chatInput" placeholder="输入你的问题...如:哪里不舒服?疼了多久?" onkeydown="if(event.key==='Enter')sendChat()"><button onclick="sendChat()">发送</button></div>
  <button class="btn btn-n" style="float:right;margin-top:10px" onclick="doneP1()">进入口腔检查 →</button>`;
  document.getElementById('phasePanel').innerHTML=html;
}

async function sendChat(){
  let inp=document.getElementById('chatInput');let msg=inp.value.trim();if(!msg)return;
  inp.value='';
  let chat=document.getElementById('chatBox');
  chat.innerHTML+=`<div class="msg st">${msg}</div>`;
  let r=await fetch('/api/consult/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:msg})});
  let d=await r.json();
  chat.innerHTML+=`<div class="msg pt">${d.reply}</div>`;
  chat.scrollTop=chat.scrollHeight;
  document.getElementById('coverBar').style.width=d.coverage+'%';
  document.getElementById('coverPct').textContent=d.coverage+'%';
}

async function doneP1(){
  let r=await fetch('/api/consult/phase1/done',{method:'POST'});let d=await r.json();
  // 显示阶段评分
  let missedHTML=d.coverage_detail.filter(x=>!x.covered).map(x=>`<span style="background:#fadbd8;padding:2px 6px;border-radius:4px;margin:2px">❌ ${x.keywords}</span>`).join(' ');
  let coveredHTML=d.coverage_detail.filter(x=>x.covered).map(x=>`<span style="background:#d5f5e3;padding:2px 6px;border-radius:4px;margin:2px">✅ ${x.keywords}</span>`).join(' ');
  let catHTML='';
  for(let cat in d.cat_scores){
    let cs=d.cat_scores[cat];
    catHTML+=`<div style="margin:4px 0"><strong>${cat}:</strong> ${cs.covered}/${cs.total} (${cs.pct}%) <div style="height:4px;background:#eee;border-radius:2px;width:200px;display:inline-block"><div style="height:100%;background:${cs.pct>=70?'#27ae60':cs.pct>=40?'#e67e22':'#c0392b'};width:${cs.pct}%;border-radius:2px"></div></div></div>`;
  }

  document.getElementById('resultCard').innerHTML=`
    <h2 style="text-align:center;color:#1B3A5C">📊 阶段一：病史采集评分</h2>
    <div class="scores">
      <div class="itm"><div class="val" style="color:${d.score>=70?'#27ae60':d.score>=40?'#e67e22':'#c0392b'}">${d.score}</div><div class="lbl">问诊评分</div></div>
      <div class="itm"><div class="val" style="color:#2B7BEC">${d.coverage_pct}%</div><div class="lbl">覆盖度</div></div>
      <div class="itm"><div class="val" style="color:#8e44ad">${d.covered_groups}/${d.total_groups}</div><div class="lbl">已覆盖/总要点</div></div>
    </div>
    <div style="margin-bottom:10px"><strong>📌 各类别覆盖:</strong>${catHTML}</div>
    <div style="margin-bottom:10px"><strong>✅ 已覆盖:</strong> ${coveredHTML||'无'}</div>
    <div style="margin-bottom:10px"><strong>❌ 遗漏:</strong> ${missedHTML||'无'}</div>
    ${d.suggestions.length?`<div style="background:#fff8e1;padding:10px;border-radius:8px;margin-bottom:10px"><strong>🔧 改进建议:</strong><br>${d.suggestions.map(s=>'· '+s).join('<br>')}</div>`:''}
    <button class="btn btn-p" onclick="document.getElementById('resultOverlay').classList.remove('show');examItems=d.exam_items;phase=2;renderPhase()">👉 进入口腔检查</button>
  `;
  document.getElementById('resultOverlay').classList.add('show');
}

// ═══════════════════ Phase 2: 检查（两步） ═══════════════════
function renderP2(){
  let checkDone=examSeq.length>0&&examIdx>=examSeq.length;
  let html=`<h3>🔬 口腔检查</h3>`;

  if(examSeq.length===0){
    // Step 2a: 排出检查顺序
    html+=`<p style="font-size:13px;color:#666;margin-bottom:10px">第一步：请按正确顺序排列检查项目（点击选择，按点击顺序排列）</p>`;
    html+=`<div class="exam-grid">`;
    for(let item of examItems){
      let sel=examSeq.includes(item);
      html+=`<div class="exam-card${sel?' selected':''}" id="seq-${item.replace(/[^a-zA-Z0-9一-龥]/g,'')}" onclick="toggleSeq('${item}')"><h4>${sel?'✅ ':''}${item}</h4></div>`;
    }
    html+=`</div><p style="font-size:12px;color:#999;margin:8px 0">已选顺序: <span id="seqDisplay">${examSeq.join(' → ')||'(未选择)'}</span></p>`;
    html+=`<button class="btn btn-p" onclick="submitSeq()"${examSeq.length<3?' disabled':''}>确认检查顺序</button>`;
  } else {
    // Step 2b: 逐项填写检查细节
    if(examIdx<examSeq.length){
      let cur=examSeq[examIdx];let done=examDone[cur];
      html+=`<p style="font-size:13px;color:#999">检查顺序: ${examSeq.join(' → ')}</p>`;
      html+=`<div style="background:#fff;border:2px solid #2B7BEC;border-radius:12px;padding:16px;margin-top:10px">`;
      html+=`<h4 style="font-size:16px;color:#1B3A5C;margin-bottom:12px">📋 第${examIdx+1}/${examSeq.length}项: ${cur}</h4>`;
      html+=`<div class="form-group"><label>🔧 应选择的器械/工具（用逗号分隔）</label><input id="instrInput" placeholder="如: 口镜, 5号镰形探针"></div>`;
      html+=`<div class="form-group"><label>📝 操作技术描述</label><textarea id="techInput" placeholder="描述操作步骤和技术要点..."></textarea></div>`;
      html+=`<div class="form-group"><label>🔑 关键操作要点（用逗号分隔）</label><input id="kpInput" placeholder="如: 先对照牙后患牙, 力度由轻到重"></div>`;
      if(!done) html+=`<button class="btn btn-p" onclick="submitExamItem()">提交并查看结果</button>`;
      html+=`<div class="feedback${done?' show':''}" id="feedbackBox">${done?done.feedback:''}</div></div>`;
      if(done && examIdx<examSeq.length-1) html+=`<button class="btn btn-n" style="float:right;margin-top:8px" onclick="examIdx++;renderP2()">下一项 →</button>`;
      if(examIdx>=examSeq.length-1 && Object.keys(examDone).length>=examSeq.length) html+=`<button class="btn btn-n" style="float:right;margin-top:8px" onclick="doneP2()">完成检查，进入病历 →</button>`;
    }
  }
  document.getElementById('phasePanel').innerHTML=html;
}

function toggleSeq(item){
  let idx=examSeq.indexOf(item);
  if(idx>=0){examSeq.splice(idx,1)}else{examSeq.push(item)}
  renderP2();
}

async function submitSeq(){
  let r=await fetch('/api/consult/exam/submit_sequence',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({sequence:examSeq})});
  let d=await r.json();
  if(d.errors.length>0) alert('顺序建议:\n'+d.errors.join('\n'));
  examIdx=0;renderP2();
}

async function submitExamItem(){
  let cur=examSeq[examIdx];
  let instruments=document.getElementById('instrInput').value.trim();
  let technique=document.getElementById('techInput').value.trim();
  let keyPoints=document.getElementById('kpInput').value.trim();
  if(!instruments||!technique){alert('请填写器械和技术描述');return}

  let r=await fetch('/api/consult/exam/submit_item',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({item:cur,instruments,technique,key_points:keyPoints})});
  let d=await r.json();
  examTotalScore+=d.scores.total;

  let fb=`<p style="font-weight:600">临床发现:</p><p>${d.finding}</p>`;
  fb+=`<p class="correct">✅ 标准器械: ${d.correct_instruments.join(', ')}</p>`;
  fb+=`<p class="correct">✅ 标准技术: ${d.correct_technique}</p>`;
  fb+=`<p class="correct">✅ 关键要点: ${d.correct_key_points}</p>`;
  fb+=`<p style="margin-top:6px;font-size:11px">得分: 器械${d.scores.instruments}+技术${d.scores.technique}+描述${d.scores.description}=${d.scores.total}</p>`;

  examDone[cur]={feedback:fb};
  document.getElementById('feedbackBox').innerHTML=fb;document.getElementById('feedbackBox').classList.add('show');
}

async function doneP2(){
  let r=await fetch('/api/consult/phase2/done',{method:'POST'});let d=await r.json();
  let errHTML=d.errors.length?d.errors.map(e=>`<div style="color:#c0392b">❌ ${e}</div>`).join(''):'<div style="color:#27ae60">✅ 检查顺序正确</div>';

  document.getElementById('resultCard').innerHTML=`
    <h2 style="text-align:center;color:#1B3A5C">📊 阶段二：口腔检查评分</h2>
    <div class="scores">
      <div class="itm"><div class="val" style="color:${d.scores.total>=70?'#27ae60':d.scores.total>=40?'#e67e22':'#c0392b'}">${d.scores.total}</div><div class="lbl">检查综合评分</div></div>
      <div class="itm"><div class="val" style="color:#2B7BEC">${d.scores.sequence}</div><div class="lbl">顺序(满分15)</div></div>
      <div class="itm"><div class="val" style="color:#8e44ad">${d.scores.technique}</div><div class="lbl">器械技术(满分100)</div></div>
    </div>
    <p style="text-align:center;font-size:14px">完成度: ${d.completed}</p>
    <div style="margin-bottom:10px"><strong>🔍 顺序分析:</strong><br>${errHTML}</div>
    ${d.suggestions.length?`<div style="background:#fff8e1;padding:10px;border-radius:8px;margin-bottom:10px"><strong>🔧 改进建议:</strong><br>${d.suggestions.map(s=>'· '+s).join('<br>')}</div>`:''}
    <button class="btn btn-p" onclick="document.getElementById('resultOverlay').classList.remove('show');phase=3;renderPhase()">👉 进入病历书写</button>
  `;
  document.getElementById('resultOverlay').classList.add('show');
}

// ═══════════════════ Phase 3: 病历书写 ═══════════════════
function renderP3(){
  let html=`<h3>📝 病历书写</h3>
<div class="form-group"><label>诊断（牙位+疾病类型）</label><input id="diag" placeholder="如: 36慢性牙髓炎急性发作"></div>
<div class="form-group"><label>鉴别诊断（用逗号分隔）</label><input id="diff" placeholder="如: 急性根尖周炎, 三叉神经痛"></div>
<div class="form-group"><label>治疗计划（每行一项）</label><textarea id="txplan" placeholder="1. 36根管治疗术&#10;2. ..." style="min-height:80px"></textarea></div>
<button class="btn btn-s" onclick="submitRecord()" style="width:100%">📋 提交病历</button>`;
  document.getElementById('phasePanel').innerHTML=html;
}

async function submitRecord(){
  let diag=document.getElementById('diag').value.trim();if(!diag){alert('请输入诊断');return}
  let diff=document.getElementById('diff').value.trim();let tx=document.getElementById('txplan').value.trim();
  let r=await fetch('/api/consult/record/submit',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({diagnosis:diag,differential:diff,treatment_plan:tx})});
  let d=await r.json();
  document.getElementById('headerMeta').textContent+=' | 总分:'+d.scores.total;

  // 生成失分分析
  let lostPoints=[];
  if(d.scores.diagnosis<80) lostPoints.push({item:'诊断',score:d.scores.diagnosis,reason:`与标准诊断"${d.correct.diagnosis}"有偏差`,fix:'仔细分析主诉+检查结果，注意牙髓炎急性发作的关键指标：冷测持续痛+自发痛+夜间痛'});
  if(d.scores.differential<60) lostPoints.push({item:'鉴别诊断',score:d.scores.differential,reason:'鉴别诊断覆盖不全',fix:'至少应列出2-3个需鉴别的疾病，并说明排除依据'});
  if(d.scores.treatment<70) lostPoints.push({item:'治疗计划',score:d.scores.treatment,reason:'治疗方案不完整或关键步骤缺失',fix:'应包括：急诊处理→根管治疗→冠部修复→卫生宣教→复查'});
  let lostHTML=lostPoints.length?lostPoints.map(l=>`<div style="background:#fff5f5;padding:8px;border-left:3px solid #c0392b;margin:6px 0;font-size:12px"><strong>⚠️ ${l.item} (${l.score}分):</strong> ${l.reason}<br><span style="color:#27ae60">💡 改进: ${l.fix}</span></div>`).join(''):'<div style="color:#27ae60;font-size:12px">✅ 各项均达到标准</div>';

  document.getElementById('resultCard').innerHTML=`
    <h2 style="text-align:center;color:#1B3A5C">📊 阶段三：病历书写评估</h2>
    <div class="scores">
      <div class="itm"><div class="val" style="color:${d.scores.diagnosis>=80?'#27ae60':d.scores.diagnosis>=50?'#e67e22':'#c0392b'}">${d.scores.diagnosis}</div><div class="lbl">诊断</div></div>
      <div class="itm"><div class="val" style="color:${d.scores.differential>=70?'#27ae60':'#e67e22'}">${d.scores.differential}</div><div class="lbl">鉴别</div></div>
      <div class="itm"><div class="val" style="color:${d.scores.treatment>=70?'#27ae60':'#e67e22'}">${d.scores.treatment}</div><div class="lbl">治疗计划</div></div>
      <div class="itm"><div class="val" style="color:#8e44ad">${d.scores.examination}</div><div class="lbl">检查</div></div>
      <div class="itm"><div class="val" style="color:#c0392b;font-size:40px">${d.scores.total}</div><div class="lbl">综合总分</div></div>
    </div>
    <p style="text-align:center;font-size:15px">✅ 标准诊断: <strong>${d.correct.diagnosis}</strong></p>
    <div style="margin:12px 0"><strong>📌 失分点与改进措施:</strong>${lostHTML}</div>
    <h4 style="margin-top:12px">标准治疗计划</h4>${d.correct.treatment.map(t=>'<div style="font-size:13px">· '+t+'</div>').join('')}
    <h4 style="margin-top:8px">处置</h4><div style="font-size:12px;white-space:pre-wrap">${d.correct.procedure}</div>
    <h4 style="margin-top:8px">医嘱</h4>${d.correct.orders.map(o=>'<div style="font-size:12px">· '+o+'</div>').join('')}
    <details style="margin-top:12px"><summary style="cursor:pointer;color:#2B7BEC;font-size:14px">📋 查看电子病历</summary><div class="record-box">${d.record.replace(/\n/g,'<br>')}</div></details>
  `;
  document.getElementById('resultOverlay').classList.add('show');
}
</script>
</body></html>
